# Lumina-Proxy Configuration Example

# 服务器配置
server:
  port: 8080
  host: "0.0.0.0"          # 默认: "0.0.0.0"
  auth_token: "local-secret-key"  # 可选，不设置则禁用认证
  # 代理配置（可选）- 所有出站请求将通过该代理
  # 注意: no_proxy 目前可通过 NO_PROXY 环境变量设置
  # proxy:
  #   http: "http://proxy.example.com:8080"   # HTTP 代理
  #   https: "http://proxy.example.com:8080"  # HTTPS 代理

# 日志配置
logging:
  level: "trace"            # 级别: "trace", "debug", "info", "warn", "error"
  console: false           # 启用控制台输出 (默认: false)
  file:
    enabled: true          # 启用文件日志
    path: "./lumina.log"   # 日志文件路径
    rotation: "daily"      # 轮转策略: "daily", "size", "never"
    max_size_mb: 100       # 按大小轮转时的最大大小
    max_files: 5           # 保留最多多少个轮转文件

# 统计持久化配置
statistics:
  enabled: true
  stats_file: "./stats.jsonl"      # 聚合统计文件路径
  aggregation_interval_secs: 60   # 聚合间隔（秒）

# 路由配置
routes:
  - model_name: "gpt-4o"
    provider_type: "openai"          # openai | ollama | anthropic | gemini | moonlight | openai-compatible
    base_url: "https://api.openai.com"
    api_key: "sk-xxxx"
    enabled: true

  - model_name: "claude-3-opus"
    provider_type: "anthropic"
    base_url: "https://api.anthropic.com"
    api_key: "sk-xxxx"
    enabled: true

  - model_name: "gemini-pro"
    provider_type: "gemini"
    base_url: "https://generativelanguage.googleapis.com"
    api_key: "xxxx"  # Gemini API key
    enabled: true

  - model_name: "deepseek-coder"
    provider_type: "openai-compatible"
    url: "https://api.deepseek.com/chat/completions"
    api_key: "sk-yyyy"
    enabled: true

  - model_name: "llama3:8b"
    provider_type: "ollama"
    base_url: "http://localhost:11434"  # Ollama 填写 base URL，自动拼接 /api/chat
    api_key: "ollama"                     # Ollama 本地通常不需要，可填任意值
    enabled: true

  # Moonlight (月光) API example
  - model_name: "your-moonlight-model"
    provider_type: "moonlight"
    url: "https://api.moonlight.example.com/v1/chat/completions"
    api_key: "your-moonlight-api-key"
    enabled: true

  # Example with model alias: client requests "gpt-4o", proxy sends "gpt-4o-2024-08-06" to upstream
  - model_name: "gpt-4o"
    upstream_model: "gpt-4o-2024-08-06"
    provider_type: "openai"
    base_url: "https://api.openai.com"
    api_key: "sk-xxxx"
    enabled: true
